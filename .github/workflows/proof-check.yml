name: proof-check

on:
  push:
  pull_request:

jobs:
  validate-repo-shape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required proof files
        run: |
          test -f README.md
          test -f docs/AZURE_FABRIC_EXPORT_TO_GIT.md
          test -f docs/ARCHITECTURE.md
          test -f src/python/build_leatt_bi_ml_package.py
          test -f src/powerbi/powerbi_dax_measures.dax
          test -d artifacts/reports
          test -d artifacts/evidence_images
